<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 全球投資組合 + 即時新聞</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 { font-size: 32px; background: linear-gradient(90deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .status { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.7); font-size: 14px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00e676; }
        .tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .tab { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .tab:hover { background: rgba(255,255,255,0.2); }
        .tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 16px; padding: 24px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .stat-value { font-size: 28px; font-weight: bold; }
        .stat-label { color: rgba(255,255,255,0.7); font-size: 13px; margin-top: 4px; }
        .positive { color: #00e676; }
        .negative { color: #ff1744; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { font-size: 20px; margin-bottom: 20px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 16px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255,255,255,0.05); font-weight: 600; color: rgba(255,255,255,0.8); }
        th:first-child, td:first-child { text-align: left; }
        .symbol { font-weight: bold; color: #667eea; font-size: 16px; }
        .currency { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .currency.usd { background: rgba(0,230,118,0.2); color: #00e676; }
        .currency.twd { background: rgba(239,68,68,0.2); color: #ef4444; }
        .shares { color: rgba(255,255,255,0.8); }
        .gain-loss { padding: 4px 10px; border-radius: 6px; font-weight: 600; }
        .gain-loss.pos { background: rgba(0,230,118,0.2); color: #00e676; }
        .gain-loss.neg { background: rgba(255,23,68,0.2); color: #ff1744; }
        .chart-container { height: 350px; margin-top: 20px; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .section-title { background: linear-gradient(90deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3)); padding: 10px 15px; border-radius: 8px; margin: 20px 0 15px; font-size: 14px; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 全球投資組合</h1>
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px;">
                <span class="status"><div class="status-dot"></div> 更新時間: 2026-02-11</span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-value positive" id="totalValue">$0</div><div class="stat-label">總市值 (USD)</div></div>
            <div class="stat-card"><div class="stat-value" id="totalCost">$0</div><div class="stat-label">總成本 (USD)</div></div>
            <div class="stat-card"><div class="stat-value" id="totalPnl">$0</div><div class="stat-label">未實現損益</div></div>
            <div class="stat-card"><div class="stat-value" id="totalReturn">0%</div><div class="stat-label">報酬率</div></div>
        </div>
        
        <div class="card">
            <h2>📊 台股持股 (9 檔)</h2>
            <div class="table-wrapper"><table><thead><tr><th>代號</th><th>股數</th><th>均價</th><th>股價</th><th>總成本</th><th>市值</th><th>未實現損益</th><th>報酬率</th></tr></thead><tbody id="twdBody"></tbody></table></div>
        </div>
        
        <div class="card">
            <h2>📊 美股持股 (25 檔)</h2>
            <div class="table-wrapper"><table><thead><tr><th>代號</th><th>股數</th><th>均價</th><th>股價</th><th>總成本</th><th>市值</th><th>未實現損益</th><th>報酬率</th></tr></thead><tbody id="usdBody"></tbody></table></div>
        </div>
        
        <div class="card"><h2>🥧 投資配置</h2><div class="chart-container"><canvas id="allocationChart"></canvas></div></div>
    </div>
    
    <script>
        const USD_TO_TWD = 32.5;
        
        // 台股
        const twdStocks = [
            { symbol: '0050', name: '元大台灣50', shares: 1000, avgCost: 49.32, price: 77.20, currency: 'TWD', marketValue: 77200, costBasis: 49390, pnl: 27610, pnlPct: 55.93 },
            { symbol: '006208', name: '富邦台50', shares: 1000, avgCost: 114.05, price: 178.65, currency: 'TWD', marketValue: 178650, costBasis: 114212, pnl: 64438, pnlPct: 56.42 },
            { symbol: '00631L', name: '國泰臺灣加權正2', shares: 5000, avgCost: 41.34, price: 63.40, currency: 'TWD', marketValue: 317000, costBasis: 206992, pnl: 110008, pnlPct: 53.15 },
            { symbol: '00717B', name: '國泰10Y+金融債', shares: 10000, avgCost: 14.83, price: 16.46, currency: 'TWD', marketValue: 164600, costBasis: 148510, pnl: 16090, pnlPct: 10.83 },
            { symbol: '富喬', name: '富喬', shares: 1000, avgCost: 65.20, price: 96.60, currency: 'TWD', marketValue: 96600, costBasis: 65292, pnl: 31308, pnlPct: 47.95 },
            { symbol: '超豐', name: '超豐', shares: 2000, avgCost: 93.40, price: 88.60, currency: 'TWD', marketValue: 177200, costBasis: 187065, pnl: -9865, pnlPct: -5.28 },
            { symbol: '泰鼎-KY', name: '泰鼎-KY', shares: 19000, avgCost: 32.81, price: 33.30, currency: 'TWD', marketValue: 632700, costBasis: 624334, pnl: 8366, pnlPct: 1.34 },
            { symbol: '榮科', name: '榮科', shares: 6000, avgCost: 53.43, price: 50.20, currency: 'TWD', marketValue: 301200, costBasis: 321053, pnl: -19853, pnlPct: -6.18 },
            { symbol: '德宏', name: '德宏', shares: 3000, avgCost: 62.83, price: 163.00, currency: 'TWD', marketValue: 489000, costBasis: 188767, pnl: 300233, pnlPct: 159.05 }
        ];
        
        // 美股 (25 檔)
        const usdStocks = [
            { symbol: 'NVDA', name: 'NVIDIA', shares: 150, avgCost: 174.73, price: 190.04, currency: 'USD', pnlPct: 8.77 },
            { symbol: 'AVGO', name: '博通', shares: 46, avgCost: 345.39, price: 343.94, currency: 'USD', pnlPct: -0.42 },
            { symbol: 'TSM', name: '台積電', shares: 70, avgCost: 284.22, price: 355.41, currency: 'USD', pnlPct: 25.04 },
            { symbol: 'GOOG', name: '谷歌', shares: 37, avgCost: 247.11, price: 324.40, currency: 'USD', pnlPct: 31.28 },
            { symbol: 'AMAT', name: '應用材料', shares: 20, avgCost: 163.00, price: 330.57, currency: 'USD', pnlPct: 102.80 },
            { symbol: 'AMD', name: 'AMD', shares: 50, avgCost: 152.56, price: 216.00, currency: 'USD', pnlPct: 41.58 },
            { symbol: 'ASML', name: 'ASML', shares: 3, avgCost: 703.00, price: 1429.49, currency: 'USD', pnlPct: 103.34 },
            { symbol: 'MSFT', name: '微軟', shares: 7, avgCost: 489.35, price: 413.60, currency: 'USD', pnlPct: -15.48 },
            { symbol: 'META', name: 'Meta', shares: 6, avgCost: 643.81, price: 677.22, currency: 'USD', pnlPct: 5.19 },
            { symbol: 'AMZN', name: '亞馬遜', shares: 20, avgCost: 220.01, price: 208.72, currency: 'USD', pnlPct: -5.13 },
            { symbol: 'CRWD', name: 'CrowdStrike', shares: 5, avgCost: 427.00, price: 408.04, currency: 'USD', pnlPct: -4.44 },
            { symbol: 'PLTR', name: 'Palantir', shares: 35, avgCost: 175.13, price: 142.91, currency: 'USD', pnlPct: -18.40 },
            { symbol: 'ITA', name: '義大利 ETF', shares: 20, avgCost: 194.24, price: 234.84, currency: 'USD', pnlPct: 20.90 },
            { symbol: 'CAVA', name: 'CAVA', shares: 40, avgCost: 62.50, price: 71.46, currency: 'USD', pnlPct: 14.34 },
            { symbol: 'COIN', name: 'Coinbase', shares: 43, avgCost: 303.37, price: 166.09, currency: 'USD', pnlPct: -45.25 },
            { symbol: 'CRWV', name: 'CryptoWave', shares: 55, avgCost: 105.17, price: 94.68, currency: 'USD', pnlPct: -9.97 },
            { symbol: 'EOSE', name: 'Eos Energy', shares: 200, avgCost: 11.99, price: 12.86, currency: 'USD', pnlPct: 7.25 },
            { symbol: 'GCL', name: 'GCL', shares: 2000, avgCost: 1.07, price: 0.7214, currency: 'USD', pnlPct: -32.65 },
            { symbol: 'HIMS', name: 'Hims & Hers', shares: 100, avgCost: 48.10, price: 18.29, currency: 'USD', pnlPct: -61.98 },
            { symbol: 'ONDS', name: 'Ondas', shares: 350, avgCost: 8.82, price: 10.08, currency: 'USD', pnlPct: 14.31 },
            { symbol: 'SNPS', name: 'Synopsys', shares: 30, avgCost: 429.06, price: 440.88, currency: 'USD', pnlPct: 2.76 },
            { symbol: 'SOFI', name: 'SoFi', shares: 170, avgCost: 24.40, price: 21.73, currency: 'USD', pnlPct: -10.93 },
            { symbol: 'BABA', name: '阿里巴巴', shares: 20, avgCost: 169.25, price: 165.45, currency: 'USD', pnlPct: -2.25 },
            { symbol: 'CHYM', name: 'Chym', shares: 150, avgCost: 20.40, price: 23.52, currency: 'USD', pnlPct: 15.29 },
            { symbol: 'TSLA', name: '特斯拉', shares: 50, avgCost: 411.84, price: 417.32, currency: 'USD', pnlPct: 1.33 }
        ];
        
        // 計算市值和損益
        usdStocks.forEach(s => {
            s.costBasis = s.shares * s.avgCost;
            s.marketValue = s.shares * s.price;
            s.pnl = s.marketValue - s.costBasis;
        });
        
        function formatUSD(num) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num); }
        function formatTWD(num) { return new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD' }).format(num); }
        
        function renderTable(bodyId, stocks) {
            const tbody = document.getElementById(bodyId);
            tbody.innerHTML = '';
            const sorted = [...stocks].sort((a, b) => b.pnlPct - a.pnlPct);
            sorted.forEach(s => {
                const pnlClass = s.pnl >= 0 ? 'pos' : 'neg';
                const sign = s.pnl >= 0 ? '+' : '';
                const badge = s.currency === 'TWD' ? '<span class="currency twd">TWD</span>' : '<span class="currency usd">USD</span>';
                const fmt = s.currency === 'TWD' ? formatTWD : formatUSD;
                tbody.innerHTML += `<tr><td class="symbol">${s.symbol}${badge}<br><span style="font-size:11px;color:rgba(255,255,255,0.5)">${s.name}</span></td><td class="shares">${s.shares}</td><td>${fmt(s.avgCost)}</td><td>${fmt(s.price)}</td><td>${fmt(s.costBasis)}</td><td>${fmt(s.marketValue)}</td><td><span class="gain-loss ${pnlClass}">${sign}${fmt(s.pnl)}</span></td><td><span class="gain-loss ${pnlClass}">${sign}${s.pnlPct.toFixed(2)}%</span></td></tr>`;
            });
        }
        
        function renderPortfolio() {
            renderTable('twdBody', twdStocks);
            renderTable('usdBody', usdStocks);
            
            let totalUSD = 0, totalCostUSD = 0, totalPnlUSD = 0;
            twdStocks.forEach(s => { totalUSD += s.marketValue / USD_TO_TWD; totalCostUSD += s.costBasis / USD_TO_TWD; totalPnlUSD += s.pnl / USD_TO_TWD; });
            usdStocks.forEach(s => { totalUSD += s.marketValue; totalCostUSD += s.costBasis; totalPnlUSD += s.pnl; });
            
            const totalReturn = totalCostUSD > 0 ? (totalPnlUSD / totalCostUSD) * 100 : 0;
            document.getElementById('totalValue').textContent = formatUSD(totalUSD);
            document.getElementById('totalCost').textContent = formatUSD(totalCostUSD);
            document.getElementById('totalPnl').textContent = (totalPnlUSD >= 0 ? '+' : '') + formatUSD(totalPnlUSD);
            document.getElementById('totalPnl').className = 'stat-value ' + (totalPnlUSD >= 0 ? 'positive' : 'negative');
            document.getElementById('totalReturn').textContent = (totalReturn >= 0 ? '+' : '') + totalReturn.toFixed(2) + '%';
            document.getElementById('totalReturn').className = 'stat-value ' + (totalReturn >= 0 ? 'positive' : 'negative');
            
            updateChart();
        }
        
        function updateChart() {
            const ctx = document.getElementById('allocationChart').getContext('2d');
            const data = [];
            twdStocks.forEach(s => data.push({ symbol: s.symbol, name: s.name, value: s.marketValue / USD_TO_TWD }));
            usdStocks.forEach(s => data.push({ symbol: s.symbol, name: s.name, value: s.marketValue }));
            data.sort((a, b) => b.value - a.value);
            new Chart(ctx, {
                type: 'doughnut',
                data: { labels: data.map(d => d.symbol), datasets: [{ data: data.map(d => d.value), backgroundColor: ['#667eea','#764ba2','#f093fb','#f5576c','#4facfe','#00f2fe','#43e97b','#38f9d7','#fa709a','#fee140','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7','#dda0dd','#98d8c8','#f7dc6f','#bb8fce','#ff7979','#badc58','#a29bfe','#6c5ce7','#fd79a8','#00b894','#e17055'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#fff', padding: 12, font: { size: 11 } } }, tooltip: { callbacks: { label: ctx => { const d = data[ctx.dataIndex]; return `${d.symbol} ${d.name}: ${formatUSD(ctx.raw)}`; } } } } }
            });
        }
        
        renderPortfolio();
    </script>
</body>
</html>
