<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 股票追蹤儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        .neutral { color: #6b7280; }
        .glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <!-- Header -->
    <header class="border-b border-gray-700/50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📈</span>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                    股票追蹤儀表板
                </h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="lastUpdate" class="text-sm text-gray-400"></span>
                <button onclick="refreshAll()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg flex items-center gap-2 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    重新整理
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6">
        <!-- Portfolio Summary -->
        <section class="mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <span>💰</span> 投資組合總覽
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="card rounded-xl p-6">
                    <div class="text-gray-400 text-sm">總市值</div>
                    <div class="text-3xl font-bold mt-2" id="totalValue">-</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-gray-400 text-sm">總成本</div>
                    <div class="text-3xl font-bold mt-2" id="totalCost">-</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-gray-400 text-sm">未實現損益</div>
                    <div class="text-3xl font-bold mt-2" id="totalProfitLoss">-</div>
                </div>
                <div class="card rounded-xl p-6">
                    <div class="text-gray-400 text-sm">報酬率</div>
                    <div class="text-3xl font-bold mt-2" id="totalPercent">-</div>
                </div>
            </div>
        </section>

        <!-- Charts Row -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- Portfolio Distribution -->
            <div class="card rounded-xl p-6">
                <h3 class="text-lg font-semibold mb-4">📊 部位分布</h3>
                <div id="allocationChart" class="h-64"></div>
            </div>
            <!-- Performance Chart -->
            <div class="card rounded-xl p-6">
                <h3 class="text-lg font-semibold mb-4">📈 報酬率分布</h3>
                <div id="performanceChart" class="h-64"></div>
            </div>
        </section>

        <!-- Recommendations -->
        <section class="mb-8">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <span>🎯</span> 買賣建議
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="card rounded-xl p-4 border-l-4 border-green-500">
                    <div class="flex justify-between items-center">
                        <span class="text-green-400 font-semibold">買入 (BUY)</span>
                        <span class="text-2xl font-bold" id="buyCount">0</span>
                    </div>
                </div>
                <div class="card rounded-xl p-4 border-l-4 border-yellow-500">
                    <div class="flex justify-between items-center">
                        <span class="text-yellow-400 font-semibold">持有 (HOLD)</span>
                        <span class="text-2xl font-bold" id="holdCount">0</span>
                    </div>
                </div>
                <div class="card rounded-xl p-4 border-l-4 border-red-500">
                    <div class="flex justify-between items-center">
                        <span class="text-red-400 font-semibold">賣出 (SELL)</span>
                        <span class="text-2xl font-bold" id="sellCount">0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Stock List -->
        <section class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <span>📋</span> 持股明細
                </h2>
                <button onclick="showAddModal()" class="px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg flex items-center gap-2 transition">
                    <span>+</span> 新增持股
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-gray-400 border-b border-gray-700">
                            <th class="pb-3">股票</th>
                            <th class="pb-3">股數</th>
                            <th class="pb-3">平均成本</th>
                            <th class="pb-3">現價</th>
                            <th class="pb-3">市值</th>
                            <th class="pb-3">損益</th>
                            <th class="pb-3">報酬率</th>
                            <th class="pb-3">建議</th>
                            <th class="pb-3"></th>
                        </tr>
                    </thead>
                    <tbody id="stockTable">
                        <tr><td colspan="9" class="py-8 text-center text-gray-500">載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Top/Bottom Performers -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Top Performers -->
            <div class="card rounded-xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>🏆</span> 表現最佳
                </h3>
                <div id="topPerformers" class="space-y-3">
                    <p class="text-gray-500">載入中...</p>
                </div>
            </div>
            <!-- Bottom Performers -->
            <div class="card rounded-xl p-6">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <span>⚠️</span> 需要關注
                </h3>
                <div id="bottomPerformers" class="space-y-3">
                    <p class="text-gray-500">載入中...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Add Stock Modal -->
    <div id="addModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="card rounded-xl p-6 w-full max-w-md mx-4">
            <h3 class="text-xl font-semibold mb-4">新增持股</h3>
            <form id="addForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">股票代碼</label>
                    <input type="text" id="stockSymbol" class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg" placeholder="例如: 2330, AAPL">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">股數</label>
                    <input type="number" id="stockShares" class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg" placeholder="例如: 1000">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">平均成本</label>
                    <input type="number" step="0.01" id="stockCost" class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg" placeholder="例如: 500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="hideAddModal()" class="flex-1 px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition">取消</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-green-600 hover:bg-green-700 rounded-lg transition">新增</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Stock Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="card rounded-xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-xl font-semibold" id="detailSymbol">-</h3>
                    <p class="text-gray-400" id="detailName">-</p>
                </div>
                <button onclick="hideDetailModal()" class="text-gray-400 hover:text-white">✕</button>
            </div>
            <div id="detailChart" class="h-64 mb-4"></div>
            <div id="detailMetrics" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = '/api';

        // State
        let portfolioData = null;
        let positions = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadPortfolio();
            loadRecommendations();
        });

        // Load Portfolio Summary
        async function loadPortfolio() {
            try {
                const response = await fetch(`${API_BASE}/portfolio/summary`);
                portfolioData = await response.json();
                updateSummary();
                updateCharts();
                loadTopBottom();
            } catch (error) {
                console.error('Error loading portfolio:', error);
            }
        }

        // Load Positions
        async function loadPositions() {
            try {
                const response = await fetch(`${API_BASE}/positions`);
                const data = await response.json();
                positions = data.positions;
                updateTable();
            } catch (error) {
                console.error('Error loading positions:', error);
            }
        }

        // Load Recommendations
        async function loadRecommendations() {
            try {
                const response = await fetch(`${API_BASE}/recommendations`);
                const data = await response.json();
                document.getElementById('buyCount').textContent = data.summary.buy_count;
                document.getElementById('holdCount').textContent = data.summary.hold_count;
                document.getElementById('sellCount').textContent = data.summary.sell_count;
            } catch (error) {
                console.error('Error loading recommendations:', error);
            }
        }

        // Update Summary
        function updateSummary() {
            if (!portfolioData) return;
            
            const fmt = (num) => {
                return new Intl.NumberFormat('zh-TW', {
                    style: 'currency',
                    currency: 'TWD',
                    minimumFractionDigits: 0
                }).format(num);
            };
            
            document.getElementById('totalValue').textContent = fmt(portfolioData.total_value);
            document.getElementById('totalCost').textContent = fmt(portfolioData.total_cost);
            
            const profitLoss = portfolioData.total_profit_loss;
            const percent = portfolioData.total_profit_loss_percent;
            
            const plEl = document.getElementById('totalProfitLoss');
            const pctEl = document.getElementById('totalPercent');
            
            plEl.textContent = `${profitLoss >= 0 ? '+' : ''}${fmt(profitLoss)}`;
            plEl.className = `text-3xl font-bold mt-2 ${profitLoss >= 0 ? 'positive' : 'negative'}`;
            
            pctEl.textContent = `${percent >= 0 ? '+' : ''}${percent.toFixed(2)}%`;
            pctEl.className = `text-3xl font-bold mt-2 ${percent >= 0 ? 'positive' : 'negative'}`;
            
            document.getElementById('lastUpdate').textContent = 
                `更新時間: ${new Date(portfolioData.updated_at).toLocaleString('zh-TW')}`;
        }

        // Update Charts
        function updateCharts() {
            if (!portfolioData) return;
            
            // Allocation Chart
            const allocationData = portfolioData.by_recommendation || {};
            const labels = Object.keys(allocationData).map(k => {
                const map = {BUY: '買入', HOLD: '持有', SELL: '賣出', STRONG_BUY: '強力買入', STRONG_SELL: '強力賣出'};
                return map[k] || k;
            });
            const values = Object.values(allocationData).map(v => v.value || 0);
            
            new ApexCharts(document.querySelector("#allocationChart"), {
                series: values.length ? values : [1],
                labels: values.length ? labels : ['無資料'],
                chart: {
                    type: 'donut',
                    height: 250,
                    background: 'transparent',
                    foreColor: '#9ca3af'
                },
                colors: values.length ? 
                    ['#10b981', '#f59e0b', '#ef4444', '#22c55e', '#dc2626'] : 
                    ['#374151'],
                plotOptions: {
                    pie: {
                        donut: {
                            size: '70%',
                            labels: {
                                show: true,
                                total: {
                                    show: true,
                                    label: '總價值',
                                    formatter: () => {
                                        const total = values.reduce((a, b) => a + b, 0);
                                        return new Intl.NumberFormat('zh-TW', {
                                            style: 'currency',
                                            currency: 'TWD',
                                            notation: 'compact'
                                        }).format(total);
                                    }
                                }
                            }
                        }
                    }
                },
                legend: {
                    position: 'bottom'
                },
                dataLabels: { enabled: false },
                stroke: { show: false }
            }).render();
            
            // Performance Chart
            const posWithPL = positions.filter(p => p.profit_loss_percent !== undefined)
                .sort((a, b) => b.profit_loss_percent - a.profit_loss_percent);
            
            const symbols = posWithPL.slice(0, 10).map(p => p.stock?.symbol || p.symbol);
            const percents = posWithPL.slice(0, 10).map(p => p.profit_loss_percent);
            const colors = percents.map(p => p >= 0 ? '#10b981' : '#ef4444');
            
            new ApexCharts(document.querySelector("#performanceChart"), {
                series: [{ data: percents.length ? percents : [0] }],
                chart: {
                    type: 'bar',
                    height: 250,
                    background: 'transparent',
                    foreColor: '#9ca3af'
                },
                plotOptions: {
                    bar: {
                        borderRadius: 4,
                        horizontal: true,
                        distributed: true
                    }
                },
                colors: colors.length ? colors : ['#374151'],
                xaxis: {
                    categories: symbols.length ? symbols : ['無資料'],
                    labels: {
                        formatter: (v) => `${v.toFixed(1)}%`
                    }
                },
                yaxis: { labels: { formatter: (v) => v } },
                legend: { show: false },
                grid: { borderColor: '#374151' },
                dataLabels: {
                    enabled: true,
                    formatter: (val) => `${val.toFixed(1)}%`,
                    style: { colors: ['#000'] }
                }
            }).render();
        }

        // Update Table
        function updateTable() {
            const tbody = document.getElementById('stockTable');
            
            if (positions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="py-8 text-center text-gray-500">尚無持股資料</td></tr>';
                return;
            }
            
            tbody.innerHTML = positions.map(p => {
                const stock = p.stock || {};
                const symbol = stock.symbol || p.symbol || '?';
                const name = stock.name || '';
                const pl = p.profit_loss || 0;
                const plPct = p.profit_loss_percent || 0;
                const plClass = pl >= 0 ? 'positive' : 'negative';
                const recClass = {
                    'BUY': 'bg-green-500/20 text-green-400',
                    'HOLD': 'bg-yellow-500/20 text-yellow-400',
                    'SELL': 'bg-red-500/20 text-red-400',
                    'STRONG_BUY': 'bg-green-500/20 text-green-400 border border-green-500',
                    'STRONG_SELL': 'bg-red-500/20 text-red-400 border border-red-500'
                }[p.recommendation] || 'bg-gray-500/20 text-gray-400';
                
                const recText = {
                    'BUY': '買入',
                    'HOLD': '持有',
                    'SELL': '賣出',
                    'STRONG_BUY': '強力買入',
                    'STRONG_SELL': '強力賣出'
                }[p.recommendation] || p.recommendation || '-';
                
                return `
                    <tr class="border-b border-gray-800 hover:bg-white/5 transition">
                        <td class="py-3">
                            <div class="font-semibold">${symbol}</div>
                            <div class="text-sm text-gray-500">${name}</div>
                        </td>
                        <td class="py-3">${p.shares?.toLocaleString() || '-'}</td>
                        <td class="py-3">${p.avg_cost ? '$' + p.avg_cost.toFixed(2) : '-'}</td>
                        <td class="py-3 font-semibold">${p.current_price ? '$' + p.current_price.toFixed(2) : '-'}</td>
                        <td class="py-3">${p.current_value ? '$' + p.current_value.toLocaleString() : '-'}</td>
                        <td class="py-3 ${plClass}">${pl >= 0 ? '+' : ''}$${pl.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
                        <td class="py-3 ${plClass}">${plPct >= 0 ? '+' : ''}${plPct.toFixed(2)}%</td>
                        <td class="py-3">
                            <span class="px-2 py-1 rounded text-xs font-semibold ${recClass}">${recText}</span>
                        </td>
                        <td class="py-3">
                            <button onclick="showDetail('${symbol}')" class="text-blue-400 hover:text-blue-300">詳細</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Load Top/Bottom Performers
        async function loadTopBottom() {
            await loadPositions();
            if (positions.length === 0) return;
            
            const sorted = [...positions].sort((a, b) => (b.profit_loss_percent || 0) - (a.profit_loss_percent || 0));
            
            // Top 5
            const top5 = sorted.slice(0, 5);
            document.getElementById('topPerformers').innerHTML = top5.map((p, i) => {
                const stock = p.stock || {};
                const pl = p.profit_loss_percent || 0;
                const price = p.current_price || 0;
                return `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="text-lg">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>
                            <div>
                                <div class="font-semibold">${stock.symbol || '-'}</div>
                                <div class="text-sm text-gray-500">$${price.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="text-green-400 font-bold">+${pl.toFixed(2)}%</div>
                    </div>
                `;
            }).join('');
            
            // Bottom 5
            const bottom5 = sorted.slice(-5).reverse();
            document.getElementById('bottomPerformers').innerHTML = bottom5.map((p, i) => {
                const stock = p.stock || {};
                const pl = p.profit_loss_percent || 0;
                const price = p.current_price || 0;
                return `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg">
                        <div class="flex items-center gap-3">
                            <span class="text-lg">${i + 1}️⃣</span>
                            <div>
                                <div class="font-semibold">${stock.symbol || '-'}</div>
                                <div class="text-sm text-gray-500">$${price.toFixed(2)}</div>
                            </div>
                        </div>
                        <div class="${pl >= 0 ? 'text-green-400' : 'text-red-400'} font-bold">${pl >= 0 ? '+' : ''}${pl.toFixed(2)}%</div>
                    </div>
                `;
            }).join('');
        }

        // Refresh All
        async function refreshAll() {
            try {
                await fetch(`${API_BASE}/portfolio/update`, { method: 'POST' });
                loadPortfolio();
                loadPositions();
                loadRecommendations();
            } catch (error) {
                console.error('Error refreshing:', error);
            }
        }

        // Show Add Modal
        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('addModal').classList.add('flex');
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            document.getElementById('addModal').classList.remove('flex');
        }

        // Add Stock
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const symbol = document.getElementById('stockSymbol').value.toUpperCase();
            const shares = parseFloat(document.getElementById('stockShares').value);
            const avgCost = parseFloat(document.getElementById('stockCost').value);
            
            if (!symbol || !shares || !avgCost) {
                alert('請填寫所有欄位');
                return;
            }
            
            try {
                // Add stock first
                await fetch(`${API_BASE}/stocks`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: symbol,
                        market: symbol.match(/^[0-9]+$/) ? 'TW' : 'US'
                    })
                });
                
                // Add position
                await fetch(`${API_BASE}/positions`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        symbol: symbol,
                        shares: shares,
                        avg_cost: avgCost
                    })
                });
                
                hideAddModal();
                document.getElementById('addForm').reset();
                refreshAll();
            } catch (error) {
                console.error('Error adding stock:', error);
                alert('新增失敗');
            }
        });

        // Show Detail
        async function showDetail(symbol) {
            try {
                const response = await fetch(`${API_BASE}/analyze/${symbol}`);
                const data = await response.json();
                
                document.getElementById('detailSymbol').textContent = data.symbol;
                document.getElementById('detailName').textContent = data.fundamental?.company_name || '';
                
                // Metrics
                const metrics = [
                    { label: '現價', value: `$${data.price?.current_price?.toFixed(2) || '-'}` },
                    { label: '漲跌', value: `${data.price?.previous_close ? 
                        ((data.price.current_price - data.price.previous_close) / data.price.previous_close * 100).toFixed(2) + '%' : '-'}` },
                    { label: 'RSI', value: data.technicals?.rsi?.toFixed(0) || '-' },
                    { label: 'MA20', value: `$${data.technicals?.ma20?.toFixed(2) || '-'}` },
                    { label: '本益比', value: data.fundamental?.pe_ratio?.toFixed(1) || '-' },
                    { label: '殖利率', value: data.fundamental?.dividend_yield ? 
                        (data.fundamental.dividend_yield * 100).toFixed(2) + '%' : '-' },
                    { label: '建議', value: data.recommendation, 
                      color: data.recommendation?.includes('BUY') ? 'text-green-400' : 
                             data.recommendation?.includes('SELL') ? 'text-red-400' : 'text-yellow-400' }
                ];
                
                document.getElementById('detailMetrics').innerHTML = metrics.map(m => `
                    <div class="bg-white/5 rounded-lg p-3">
                        <div class="text-gray-400 text-sm">${m.label}</div>
                        <div class="text-lg font-semibold ${m.color || ''}">${m.value}</div>
                    </div>
                `).join('');
                
                // Chart
                const chart = new ApexCharts(document.querySelector("#detailChart"), {
                    series: [{ name: 'Price', data: [] }],
                    chart: {
                        type: 'candlestick',
                        height: 250,
                        background: 'transparent',
                        foreColor: '#9ca3af'
                    },
                    xaxis: { type: 'datetime' },
                    yaxis: { tooltip: { enabled: true } },
                    colors: ['#22c55e', '#ef4444'],
                    stroke: { width: 1 }
                });
                
                document.getElementById('detailModal').classList.remove('hidden');
                document.getElementById('detailModal').classList.add('flex');
            } catch (error) {
                console.error('Error loading detail:', error);
            }
        }

        function hideDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
            document.getElementById('detailModal').classList.remove('flex');
        }

        // Auto refresh every 5 minutes
        setInterval(refreshAll, 5 * 60 * 1000);
    </script>
</body>
</html>
